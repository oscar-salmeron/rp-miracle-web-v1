<!-- ===== RP MIRACLE | INICIO | HEADER GLOBAL ===== -->
<div id="html_rpm_header_global">

  <!-- ===== BARRA SUPERIOR ===== -->
  <div class="rp-top-ticker">
    <div class="rp-top-ticker-track">
      <span>📞 Llámanos hoy y agenda tu demostración</span>
      <span>💳 Excelentes planes de pago disponibles</span>
      <span>🍳 Cocina saludable con tecnología Royal Prestige</span>
      <span>⭐ Equipos premium para tu cocina</span>
    </div>
  </div>

  <!-- ===== HEADER ===== -->
  <header id="rpm-header">
    <div class="rpm-header-inner">
      <div class="rpm-brand">RP MIRACLE</div>

      <button class="rpm-burger">☰</button>

      <nav id="rpmNav" class="rpm-nav">
        <a class="rpm-link" href="/">Inicio</a>
        <a class="rpm-link" href="/productos">Productos</a>
        <a class="rpm-link" href="/servicios">Servicios</a>
        <a class="rpm-link" href="/distribuidor">Distribuidor</a>
        <a class="rpm-btn rpm-btn-gold" href="/unete">ÚNETE</a>
        <a class="rpm-btn" href="/contacto">Contacto</a>
      </nav>
    </div>
  </header>

  <!-- ===== CSS COMPLETO ===== -->
  <style>

    body{
      padding-top:128px;
    }

    .rp-top-ticker{
      position:fixed;
      top:0;
      width:100%;
      height:36px;
      background:#0f0f0f;
      display:flex;
      align-items:center;
      border-bottom:1px solid #D4AF37;
      z-index:10000;
    }

    .rp-top-ticker-track{
      display:flex;
      animation: ticker 30s linear infinite;
    }

    .rp-top-ticker span{
      color:#fff;
      padding:0 30px;
      font-size:14px;
      white-space:nowrap;
    }

    @keyframes ticker{
      from{ transform:translateX(0); }
      to{ transform:translateX(-50%); }
    }

    #rpm-header{
      position:fixed;
      top:36px;
      width:100%;
      height:92px;
      display:flex;
      align-items:center;
      background:#060922;
      border-bottom:2px solid #D4AF37;
      z-index:9999;
    }

    .rpm-header-inner{
      width:min(1200px,92vw);
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .rpm-brand{
      color:#fff;
      font-size:28px;
      font-family:Georgia, serif;
    }

    .rpm-nav{
      display:flex;
      gap:28px;
      align-items:center;
    }

    .rpm-link{
      color:#fff;
      text-decoration:none;
    }

    .rpm-btn{
      padding:10px 18px;
      border-radius:10px;
      border:1px solid #fff;
      color:#fff;
    }

    .rpm-btn-gold{
      background:#D4AF37;
      color:#000;
      border:none;
    }

    .rpm-burger{
      display:none;
    }

    @media(max-width:980px){
      .rpm-burger{ display:block; }
      .rpm-nav{ display:none; flex-direction:column; }
      #rpm-header.rpm-open .rpm-nav{ display:flex; }
    }

  </style>

  <!-- ===== JS (FIX SPA) ===== -->
  <script>
  (function(){
    const header = document.getElementById('rpm-header');
    if (!header) return;

    const burger = header.querySelector('.rpm-burger');

    if (burger){
      burger.addEventListener('click', ()=>{
        header.classList.toggle('rpm-open');
      });
    }

    let navigating = false;

    header.querySelectorAll('a').forEach(link=>{
      link.addEventListener('click', function(e){
        const href = link.getAttribute('href');

        if (!href.startsWith('/')) return;

        e.preventDefault();

        if (navigating) return;
        navigating = true;

        history.pushState({}, '', href);
        window.dispatchEvent(new PopStateEvent('popstate'));

        setTimeout(()=> navigating=false, 60);
      });
    });

  })();
  </script>

</div>
<!-- ===== FIN HEADER ===== -->
