  <!-- ===== INICIO HEADER CSS (RESTAURADO COMPLETO) ===== -->
  <style>

    #rpm-header{
      position:fixed;
      top:36px;
      left:0;
      width:100%;
      height:92px;
      display:flex;
      align-items:center;
      z-index:9999;
      border-bottom:2px solid #D4AF37;
      background:rgba(6, 9, 34, 0.92);
      backdrop-filter:blur(6px);
    }

    .rpm-header-inner{
      width:min(1200px, 92vw);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .rpm-brand{
      font-family:Georgia, serif;
      font-weight:700;
      font-size:28px;
      color:#ffffff;
    }

    .rpm-nav{
      display:flex;
      align-items:center;
      gap:28px;
    }

    .rpm-link{
      color:#ffffff;
      text-decoration:none;
      font-size:14px;
      text-transform:uppercase;
    }

    .rpm-dropdown{
      position:relative;
    }

    .rpm-dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      display:none;
      background:#0b1020;
      padding:10px;
    }

    .rpm-dropdown:hover .rpm-dropdown-menu{
      display:block;
    }

    .rpm-btn{
      padding:10px 18px;
      border-radius:10px;
      border:1px solid #fff;
      color:#fff;
      text-decoration:none;
    }

    .rpm-btn-gold{
      background:#D4AF37;
      color:#000;
      border:none;
    }

    .rpm-burger{
      display:none;
    }

    @media (max-width:980px){
      .rpm-burger{
        display:block;
      }

      .rpm-nav{
        display:none;
        flex-direction:column;
      }

      #rpm-header.rpm-open .rpm-nav{
        display:flex;
      }
    }

  </style>
  <!-- ===== FIN HEADER CSS ===== -->


  <!-- ===== INICIO HEADER JS (CON FIX SPA) ===== -->
  <script>
  (function(){
    const header = document.getElementById('rpm-header');
    if (!header) return;

    const burger = header.querySelector('.rpm-burger');

    let navigating = false;

    function spaNavigate(href){
      if (navigating) return;
      navigating = true;

      history.pushState({}, '', href);
      window.dispatchEvent(new PopStateEvent('popstate'));

      setTimeout(()=> navigating = false, 60);
    }

    if (burger){
      burger.addEventListener('click', function(){
        header.classList.toggle('rpm-open');
      });
    }

    header.querySelectorAll('a').forEach(link=>{
      link.addEventListener('click', function(e){
        const href = link.getAttribute('href');
        if (!href.startsWith('/')) return;

        e.preventDefault();
        spaNavigate(href);
      });
    });

  })();
  </script>
  <!-- ===== FIN HEADER JS ===== -->

</div>
