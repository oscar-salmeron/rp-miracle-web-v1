<script>
  function cerrarPopupRPMiracle() {
    var overlay = document.getElementById('rp-popup-overlay');
    if (overlay) {
      overlay.style.display = 'none';
      overlay.setAttribute('aria-hidden', 'true');
    }
    sessionStorage.setItem('rp_popup_seen', 'true');
  }

  window.addEventListener('load', function () {
    if (!sessionStorage.getItem('rp_popup_seen')) {
      setTimeout(function () {
        var overlay = document.getElementById('rp-popup-overlay');
        if (overlay) {
          overlay.style.display = 'flex';
          overlay.setAttribute('aria-hidden', 'false');
        }
      }, 6000);
    }
  });
</script>
