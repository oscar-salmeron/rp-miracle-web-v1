<style>
  #rp-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 23, 0.70);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 99999;
  }

  #rp-popup-box {
    width: 100%;
    max-width: 470px;
    background:
      linear-gradient(180deg, rgba(14, 23, 49, 0.98) 0%, rgba(7, 12, 28, 0.98) 100%);
    border: 1px solid rgba(212, 175, 55, 0.38);
    border-radius: 22px;
    box-shadow:
      0 24px 70px rgba(0, 0, 0, 0.45),
      0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    padding: 32px 28px 24px 28px;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    animation: rpPopupFadeUp 0.40s ease;
    position: relative;
    overflow: hidden;
  }

  #rp-popup-box::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at top center, rgba(212, 175, 55, 0.18) 0%, rgba(212, 175, 55, 0.00) 48%);
    pointer-events: none;
  }

  .rp-popup-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    padding: 8px 14px;
    margin: 0 0 18px 0;
    border-radius: 999px;
    background: rgba(212, 175, 55, 0.12);
    border: 1px solid rgba(212, 175, 55, 0.28);
    color: #f3d67b;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.4px;
    position: relative;
    z-index: 1;
  }

  #rp-popup-box h2 {
    margin: 0 0 14px 0;
    font-size: 33px;
    line-height: 1.08;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.6px;
    position: relative;
    z-index: 1;
  }

  #rp-popup-box p {
    margin: 0 0 24px 0;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(255, 255, 255, 0.83);
    position: relative;
    z-index: 1;
  }

  .rp-popup-main-btn {
    display: inline-block;
    width: 100%;
    box-sizing: border-box;
    background: linear-gradient(180deg, #e1bf59 0%, #cfa73a 100%);
    color: #111111;
    text-decoration: none;
    font-size: 16px;
    font-weight: 800;
    line-height: 1.3;
    padding: 15px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 10px 24px rgba(212, 175, 55, 0.22);
    transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    position: relative;
    z-index: 1;
  }

  .rp-popup-main-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 28px rgba(212, 175, 55, 0.30);
    filter: brightness(1.03);
  }

  .rp-popup-close-btn {
    margin-top: 14px;
    border: 0;
    background: transparent;
    color: rgba(255, 255, 255, 0.70);
    font-size: 14px;
    cursor: pointer;
    padding: 8px 10px;
    transition: color 0.18s ease, opacity 0.18s ease;
    position: relative;
    z-index: 1;
  }

  .rp-popup-close-btn:hover {
    color: #ffffff;
  }

  @keyframes rpPopupFadeUp {
    from {
      opacity: 0;
      transform: translateY(24px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @media (max-width: 640px) {
    #rp-popup-box {
      max-width: 100%;
      padding: 28px 20px 22px 20px;
      border-radius: 18px;
    }

    .rp-popup-badge {
      font-size: 12px;
      margin-bottom: 16px;
    }

    #rp-popup-box h2 {
      font-size: 27px;
    }

    #rp-popup-box p {
      font-size: 15px;
      line-height: 1.65;
    }

    .rp-popup-main-btn {
      font-size: 15px;
      padding: 14px 16px;
    }
  }
</style>

<div id="rp-popup-overlay" aria-hidden="true">
  <div id="rp-popup-box" role="dialog" aria-modal="true" aria-labelledby="rp-popup-title">
    <div class="rp-popup-badge">INVITACIÓN ESPECIAL RP MIRACLE</div>

    <h2 id="rp-popup-title">Participa en una encuesta y recibe un regalo</h2>

    <p>
      Estamos realizando un estudio de opinión sobre productos de cocina.
      Escríbenos para más detalles y conoce cómo participar.
    </p>

    <a
      class="rp-popup-main-btn"
      href="https://wa.me/18183078642?text=Hola,%20quiero%20participar%20en%20la%20encuesta%20de%20RP%20Miracle"
      target="_blank"
      rel="noopener noreferrer"
      onclick="cerrarPopupRPMiracle()"
    >
      Escríbenos por WhatsApp para más detalles
    </a>

    <button type="button" class="rp-popup-close-btn" onclick="cerrarPopupRPMiracle()">
      No, gracias
    </button>
  </div>
</div>

<script>
  function cerrarPopupRPMiracle() {
    var overlay = document.getElementById('rp-popup-overlay');
    if (overlay) {
      overlay.style.display = 'none';
      overlay.setAttribute('aria-hidden', 'true');
    }
    sessionStorage.setItem('rp_popup_seen', 'true');
  }

  window.addEventListener('load', function () {
    if (!sessionStorage.getItem('rp_popup_seen')) {
      setTimeout(function () {
        var overlay = document.getElementById('rp-popup-overlay');
        if (overlay) {
          overlay.style.display = 'flex';
          overlay.setAttribute('aria-hidden', 'false');
        }
      }, 6000);
    }
  });
</script>
