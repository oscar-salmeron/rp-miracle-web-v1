<!-- ===== INICIO BLOQUE: POPUP CAPTACION RP MIRACLE ===== -->
<style>
  #rp-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.58);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 99999;
  }

  #rp-popup-box {
    width: 100%;
    max-width: 430px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 18px 55px rgba(0, 0, 0, 0.28);
    padding: 28px 24px 22px 24px;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    animation: rpPopupFadeUp 0.35s ease;
  }

  #rp-popup-box h2 {
    margin: 0 0 12px 0;
    font-size: 24px;
    line-height: 1.2;
    color: #111111;
  }

  #rp-popup-box p {
    margin: 0 0 20px 0;
    font-size: 15px;
    line-height: 1.6;
    color: #4b4b4b;
  }

  .rp-popup-main-btn {
    display: inline-block;
    width: 100%;
    box-sizing: border-box;
    background: #25D366;
    color: #ffffff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    padding: 14px 16px;
    border-radius: 10px;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .rp-popup-main-btn:hover {
    background: #1ebe5d;
    transform: translateY(-1px);
  }

  .rp-popup-close-btn {
    margin-top: 12px;
    border: 0;
    background: transparent;
    color: #6d6d6d;
    font-size: 14px;
    cursor: pointer;
    padding: 6px 10px;
  }

  .rp-popup-close-btn:hover {
    color: #222222;
  }

  @keyframes rpPopupFadeUp {
    from {
      opacity: 0;
      transform: translateY(22px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 480px) {
    #rp-popup-box {
      padding: 24px 18px 20px 18px;
      border-radius: 16px;
    }

    #rp-popup-box h2 {
      font-size: 21px;
    }

    #rp-popup-box p {
      font-size: 14px;
    }

    .rp-popup-main-btn {
      font-size: 14px;
      padding: 13px 14px;
    }
  }
</style>

<div id="rp-popup-overlay" aria-hidden="true">
  <div id="rp-popup-box" role="dialog" aria-modal="true" aria-labelledby="rp-popup-title">
    <h2 id="rp-popup-title">🎁 Participa en una encuesta y recibe un regalo</h2>
    <p>
      Estamos realizando un estudio de opinión sobre productos de cocina.
      Escríbenos para más detalles y conoce cómo participar.
    </p>

    <a
      class="rp-popup-main-btn"
      href="https://wa.me/18183078642?text=Hola,%20quiero%20participar%20en%20la%20encuesta%20de%20RP%20Miracle"
      target="_blank"
      rel="noopener noreferrer"
      onclick="cerrarPopupRPMiracle()"
    >
      Escríbenos por WhatsApp para más detalles
    </a>

    <button type="button" class="rp-popup-close-btn" onclick="cerrarPopupRPMiracle()">
      No, gracias
    </button>
  </div>
</div>

<script>
  function cerrarPopupRPMiracle() {
    var overlay = document.getElementById('rp-popup-overlay');
    if (overlay) {
      overlay.style.display = 'none';
      overlay.setAttribute('aria-hidden', 'true');
    }
    sessionStorage.setItem('rp_popup_seen', 'true');
  }

  window.addEventListener('load', function () {
    if (!sessionStorage.getItem('rp_popup_seen')) {
      setTimeout(function () {
        var overlay = document.getElementById('rp-popup-overlay');
        if (overlay) {
          overlay.style.display = 'flex';
          overlay.setAttribute('aria-hidden', 'false');
        }
      }, 6000);
    }
  });
</script>
<!-- ===== FIN BLOQUE: POPUP CAPTACION RP MIRACLE ===== -->
